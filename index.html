<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> MATEMÁTICA DA MANU SENA</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C5CE7;
            --success: #00B894;
            --error: #D63031;
            --warning: #FDCB6E;
            --bg-gradient: linear-gradient(135deg, #6C5CE7 0%, #a29bfe 100%);
            --text: #2D3436;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* BG ANIMADO */
        .bg-elements { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .floating-shape { position: absolute; background: rgba(255, 255, 255, 0.1); border-radius: 50%; animation: float 15s infinite linear; }
        @keyframes float { from { transform: translateY(100vh) rotate(0deg); } to { transform: translateY(-10vh) rotate(360deg); } }

        #game-container {
            width: 90%; max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
            border: 4px solid white;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--primary); font-size: 1.8rem; margin: 10px 0; }

        .screen { display: none; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .screen.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* MEDALHAS */
        .badge-container { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .badge { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; filter: grayscale(1); opacity: 0.3; transition: 0.5s; font-size: 1.5rem; border: 2px solid #ddd; }
        .badge.unlocked { filter: grayscale(0); opacity: 1; transform: scale(1.1); border-color: gold; box-shadow: 0 0 15px rgba(255,215,0,0.5); }

        /* BOTÕES */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 15px; border: none; border-radius: 18px; font-family: 'Fredoka One', cursive; cursor: pointer; transition: 0.2s; font-size: 1.1rem; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        .btn-op { color: white; height: 70px; }
        .soma { background: #FF7675; } .sub { background: #74B9FF; } .mult { background: #A29BFE; } .divi { background: #FAB1A0; }
        .btn-back { background: #636e72; color: white; width: 100%; margin-top: 15px; }

        .question { font-size: 3.5rem; font-family: 'Fredoka One'; margin: 20px 0; color: var(--primary); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-ans { padding: 20px; border: 3px solid #EDF2F7; border-radius: 20px; background: white; font-size: 1.8rem; font-weight: 700; cursor: pointer; }
        
        #timer-bar { width: 100%; height: 12px; background: #eee; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        #progress { width: 100%; height: 100%; background: var(--warning); transition: width 0.1s linear; }

        .correct { background: var(--success) !important; color: white; animation: bounce 0.5s; }
        .wrong { background: var(--error) !important; color: white; animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

<div class="bg-elements" id="bg-dots"></div>

<div id="game-container">
    <div id="screen-menu" class="screen active">
        <h1>MATEMÁTICA DA MANU SENA 🤖</h1>
        <div class="badge-container">
            <div id="b-100" class="badge" title="Bronze (100 pts)">🥉</div>
            <div id="b-300" class="badge" title="Prata (300 pts)">🥈</div>
            <div id="b-600" class="badge" title="Ouro (600 pts)">🥇</div>
            <div id="b-1000" class="badge" title="Diamante (1000 pts)">💎</div>
        </div>
        <div class="grid-menu">
            <button class="btn btn-op soma" onclick="startGame('+')">➕ Soma</button>
            <button class="btn btn-op sub" onclick="startGame('-')">➖ Sub</button>
            <button class="btn btn-op mult" onclick="startGame('*')">✖️ Multi</button>
            <button class="btn btn-op divi" onclick="startGame('/')">➗ Divi</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div style="display: flex; justify-content: space-between; font-weight: bold;">
            <span>⭐ <span id="score">0</span></span>
            <span>Nível <span id="level">1</span></span>
        </div>
        <div id="timer-bar"><div id="progress"></div></div>
        <div class="question" id="display-q">0 + 0</div>
        <div class="options-grid" id="options-container"></div>
        <button class="btn btn-back" onclick="quitGame()">Sair</button>
    </div>

    <div id="screen-over" class="screen">
        <h1>Fim de Jogo!</h1>
        <p style="font-size: 1.5rem">Score: <strong id="final-score">0</strong></p>
        <button class="btn soma" style="width: 100%" onclick="showScreen('screen-menu')">Tentar Novamente</button>
    </div>
</div>

<script>
    let currentOp = '', score = 0, level = 1, correctAnswer = 0, timeLeft = 100, timerInterval;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // SINTETIZADOR DE SONS
    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function soundCorrect() { playSound(880, 'sine', 0.2); }
    function soundWrong() { playSound(220, 'sawtooth', 0.3); }
    function soundLevelUp() { 
        playSound(523, 'sine', 0.1); 
        setTimeout(() => playSound(659, 'sine', 0.1), 100);
        setTimeout(() => playSound(783, 'sine', 0.2), 200);
    }

    function startGame(op) {
        currentOp = op; score = 0; level = 1;
        updateUI();
        showScreen('screen-game');
        nextQuestion();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        checkBadges();
    }

    function nextQuestion() {
        clearInterval(timerInterval);
        startTimer();
        let n1, n2, max = 10 + (level * 2);
        if (currentOp === '+') { n1 = r(1, max); n2 = r(1, max); correctAnswer = n1+n2; }
        else if (currentOp === '-') { n1 = r(5, max+5); n2 = r(1, n1); correctAnswer = n1-n2; }
        else if (currentOp === '*') { n1 = r(1, level+2); n2 = r(1, 10); correctAnswer = n1*n2; }
        else { n2 = r(1, 10); n1 = n2 * r(1, level+2); correctAnswer = n1/n2; }

        document.getElementById('display-q').innerText = `${n1} ${{'+':'+','-':'-','*':'×','/':'÷'}[currentOp]} ${n2}`;
        genOptions(correctAnswer);
    }

    const r = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    function genOptions(correct) {
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        let opts = new Set([correct]);
        while(opts.size < 4) {
            let f = Math.random() > 0.5 ? correct + r(1,5) : correct - r(1,5);
            if(f >= 0) opts.add(f);
        }
        [...opts].sort(() => Math.random()-0.5).forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn-ans'; btn.innerText = opt;
            btn.onclick = () => {
                if(opt === correctAnswer) {
                    btn.classList.add('correct'); soundCorrect();
                    score += 10; if(score % 50 === 0) { level++; soundLevelUp(); }
                    updateUI(); setTimeout(nextQuestion, 500);
                } else {
                    btn.classList.add('wrong'); soundWrong();
                    setTimeout(gameOver, 500);
                }
            };
            container.appendChild(btn);
        });
    }

    function startTimer() {
        let dur = Math.max(2000, 7000 - (level * 400));
        let start = Date.now();
        timerInterval = setInterval(() => {
            timeLeft = 100 - ((Date.now() - start) / dur * 100);
            document.getElementById('progress').style.width = timeLeft + '%';
            if(timeLeft <= 0) gameOver();
        }, 50);
    }

    function gameOver() {
        clearInterval(timerInterval);
        document.getElementById('final-score').innerText = score;
        let highs = JSON.parse(localStorage.getItem('math_high') || '0');
        if(score > highs) localStorage.setItem('math_high', score);
        showScreen('screen-over');
    }

    function checkBadges() {
        let high = JSON.parse(localStorage.getItem('math_high') || '0');
        [100, 300, 600, 1000].forEach(v => {
            if(high >= v) document.getElementById(`b-${v}`).classList.add('unlocked');
        });
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('level').innerText = level;
    }

    function quitGame() { clearInterval(timerInterval); showScreen('screen-menu'); }

    // Criar partículas de fundo
    for(let i=0; i<10; i++) {
        let d = document.createElement('div');
        d.className = 'floating-shape';
        d.style.left = Math.random()*100+'vw';
        d.style.width = d.style.height = r(20,50)+'px';
        d.style.animationDuration = r(10,20)+'s';
        document.getElementById('bg-dots').appendChild(d);
    }
    
    checkBadges();
</script>
</body>
</html>
